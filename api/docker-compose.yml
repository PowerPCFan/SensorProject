services:
  api:
    build: .
    container_name: api
    ports:
      - "8080:8080"
    restart: unless-stopped
    # manual .env management for loading in python
    volumes:
      - ../timescaledb/.env:/timescaledb/.env:ro
      - ./.env:/app/.env:ro
    networks:
      - timescaledb_default
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  timescaledb_default:
    external: true
