version: '3.8'
services:
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana-storage:/var/lib/grafana
    restart: unless-stopped
    networks:
      - default
      - timescaledb_net

volumes:
  grafana-storage:

networks:
  timescaledb_net:
    external: true
    name: timescaledb_default
