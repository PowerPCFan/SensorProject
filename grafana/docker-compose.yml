services:
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    networks:
      - timescaledb_default
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  grafana_data:

networks:
  timescaledb_default:
    external: true
